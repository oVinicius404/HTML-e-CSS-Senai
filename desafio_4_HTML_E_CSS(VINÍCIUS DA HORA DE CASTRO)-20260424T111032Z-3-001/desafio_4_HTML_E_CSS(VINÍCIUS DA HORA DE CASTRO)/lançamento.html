<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Vinícius">
    <meta name="description" content="A empresa Ford está lançando um novo veículo e, portanto, decidiu reformular o seu portal na web.">
    <meta name="keywords" content="Ford, veículo, carro, lançamento, Ranger, Ranger Black">
    <link rel="stylesheet" href="style/lançamento.css">
    <link rel="stylesheet" href="style/headfoot.css">

    <title>Ford - Lançamento - Novo Veículo</title>
</head>
<body>

    <header>

        <div class="logo">
            <img src="images/ford-96.png" alt="Ford Logo" class="logo_img">
        </div>

        <nav class="cabeçalho">
            <a href="index.html" class="cabeçalho_link">Home</a>
            <a href="lançamento.html" class="cabeçalho_link">Lançamento</a>
            <a href="contato.html" class="cabeçalho_link">Contato</a>
        </nav>

    </header>

    <main>

        <div class="video">
            <iframe class="video_link" src="https://www.youtube.com/embed/vQsryuNmsL0" title="Ford Ranger 2022 | Gerações" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>

        <table>
            <thead>
                <tr>
                    <th>
                        <img src="images/XL Cabine.jpg" alt="XL Cabine">
                    </th>
                    <th>
                        <img src="images/xls 2.2 diesel.jpg" alt="XLS 2.2 Diesel">
                    </th>
                    <th>
                        <img src="images/storm.jpg" alt="Storm 3.2 Diesel">
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr class="carros_nomes">
                    <td><input type="checkbox" name="checkbox1" value="opção1">XL Cabine Simples 2.2 Diesel 4x4 MT Flex Work </td>
                    <td><input type="checkbox" name="checkbox2" value="opção2">XLS 2.2 Diesel 4x4 at 2022</td>
                    <td><input type="checkbox" name="checkbox3" value="opção3">Storm 3.2 Diesel 4x4 AT 2022</td>
                </tr>
            </tbody>
            <tfoot>
                <tr class="preços">
                    <td>Preço Sugerido: R$183.850,00</td>
                    <td>Preço Sugerido: R$220.690,00</td>
                    <td>Preço Sugerido: R$222.790,00</td>
                </tr>
            </tfoot>
        </table>

        <div class="botao_div">
            <button class="botao">Comparar Carros</button>
        </div>

    </main>

    <footer>

        <div class="redes">
            <p>Redes Sociais</p>
        </div>

        <nav class="social">
            <a target="_blank" href="https://www.facebook.com/FordBrasil/?locale=pt_BR"><img src="images/facebook-50.png" alt="Facebook Logo" class="social_links"></a>
            <a target="_blank" href="http://youtube.com/@fordbrasil"><img src="images/youtube-squared-50.png" alt="YouTube Logo" class="social_links"></a>
            <a target="_blank" href="https://www.instagram.com/fordbrasil/"><img src="images/instagram-logo-50.png" alt="Instagram Logo" class="social_links"></a>

            <div class="copyright">
                <P>&copy; 2026 Ford Brasil | Viva o Novo. Todos os direitos reservados.</P>
            </div>

            <div class="logo2">
                <img src="images/ford-96.png" alt="Ford Logo" class="logo_img2">
            </div>
        </nav>

    </footer>

    
</body>
</html>
